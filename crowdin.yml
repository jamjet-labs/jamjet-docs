# Crowdin configuration for JamJet Docs
# Docs: https://crowdin.com/page/cli-tool
#
# How it works:
#   1. Contributors write English MDX in content/docs/
#   2. Crowdin syncs English source files on every push (via GitHub integration)
#   3. Crowdin AI-translates to ja, zh, ko, es, de
#   4. Crowdin opens a PR with translated files in content/docs/<locale>/
#   5. Fumadocs i18n routing serves /ja/docs/..., /zh/docs/..., etc.
#
# Setup:
#   1. Create a Crowdin project at https://crowdin.com (free for OSS)
#   2. Install the Crowdin GitHub integration
#   3. Connect this repo — Crowdin syncs automatically

project_id_env: CROWDIN_PROJECT_ID
api_token_env: CROWDIN_API_TOKEN

preserve_hierarchy: true

files:
  - source: /content/docs/**/*.mdx
    translation: /content/docs/%locale%/**/%original_file_name%
  - source: /content/docs/**/*.md
    translation: /content/docs/%locale%/**/%original_file_name%
  - source: /content/docs/**/meta.json
    translation: /content/docs/%locale%/**/meta.json
